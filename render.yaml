services:
  - type: web
    name: bal-hesablayici
    env: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /service-worker.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /styles.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /app.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.png
        name: Cache-Control
        value: public, max-age=31536000, immutable
